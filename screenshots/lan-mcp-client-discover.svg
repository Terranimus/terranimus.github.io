<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Bob discovers Alice's shared brain</title>
  <desc id="desc">Screenshot-style mock of LAN discovery showing Alice's shared Vietnamese law notes.</desc>
  <rect width="1200" height="760" fill="#0f172a"/>
  <rect x="44" y="36" width="1112" height="688" rx="18" fill="#111827" stroke="#334155"/>
  <text x="80" y="88" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="700">Bob's TerranSoul</text>
  <text x="80" y="122" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="16">Discover Shared Brains</text>
  <rect x="80" y="156" width="1040" height="520" rx="12" fill="#1e293b" stroke="#475569"/>
  <text x="112" y="204" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700">LAN Brain Sharing</text>
  <rect x="112" y="232" width="976" height="264" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="138" y="274" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700">Discover Shared Brains</text>
  <text x="138" y="302" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="15">Find other TerranSoul instances sharing their brain on the network.</text>
  <rect x="138" y="332" width="132" height="38" rx="7" fill="#7c6fff"/>
  <text x="162" y="356" fill="#fff" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700">Scan Network</text>
  <rect x="138" y="398" width="922" height="72" rx="10" fill="#111827" stroke="#475569"/>
  <text x="166" y="430" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700">Alice - Vietnamese law notes</text>
  <rect x="390" y="410" width="96" height="28" rx="14" fill="#42340f" stroke="#fbbf24"/>
  <text x="411" y="430" fill="#fbbf24" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700">Read-only</text>
  <text x="166" y="455" fill="#94a3b8" font-family="JetBrains Mono, Consolas, monospace" font-size="13">192.168.1.42:7421</text>
  <text x="330" y="455" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="13">248 memories</text>
  <text x="438" y="455" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="13">ollama:gemma3:4b</text>
  <rect x="960" y="415" width="74" height="34" rx="6" fill="#1e293b" stroke="#7c6fff"/>
  <text x="976" y="437" fill="#a78bfa" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700">Connect</text>
  <rect x="112" y="526" width="976" height="94" rx="12" fill="#172033" stroke="#334155"/>
  <text x="138" y="562" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">Discovery found Alice, but not her token</text>
  <text x="138" y="590" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="15">Bob still needs the bearer token Alice copied from her host panel.</text>
  <text x="80" y="708" fill="#64748b" font-family="Inter, Segoe UI, sans-serif" font-size="13">Discovery broadcasts metadata only. Authentication happens during MCP search.</text>
</svg>