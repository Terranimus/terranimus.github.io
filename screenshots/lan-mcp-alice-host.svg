<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Alice shares her Vietnamese law notes</title>
  <desc id="desc">Screenshot-style mock of the TerranSoul LAN Brain Sharing panel in host mode.</desc>
  <rect width="1200" height="760" fill="#0f172a"/>
  <rect x="44" y="36" width="1112" height="688" rx="18" fill="#111827" stroke="#334155"/>
  <text x="80" y="88" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="700">Brain</text>
  <text x="80" y="122" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="16">LAN Brain Sharing</text>
  <rect x="80" y="156" width="1040" height="520" rx="12" fill="#1e293b" stroke="#475569"/>
  <text x="112" y="204" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700">LAN Brain Sharing</text>
  <rect x="112" y="232" width="976" height="64" rx="10" fill="#172033" stroke="#334155"/>
  <rect x="134" y="252" width="28" height="28" rx="7" fill="#7c6fff"/>
  <path d="M141 265 l6 6 l12 -14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="178" y="270" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="17">Enable LAN brain sharing and discovery on this device</text>
  <text x="178" y="288" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="13">Discovery uses UDP 7424. MCP retrieval still requires the bearer token.</text>
  <rect x="112" y="326" width="976" height="286" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="138" y="368" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700">Share Your Brain</text>
  <text x="138" y="396" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="15">Share your brain's knowledge with other TerranSoul instances on the same network.</text>
  <rect x="138" y="428" width="922" height="132" rx="10" fill="#111827" stroke="#475569"/>
  <text x="166" y="466" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="15">Status:</text>
  <rect x="244" y="446" width="94" height="30" rx="15" fill="#123d31" stroke="#34d399"/>
  <text x="266" y="467" fill="#34d399" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700">Sharing</text>
  <text x="166" y="506" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="15">Name:</text>
  <text x="244" y="506" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="15">Alice - Vietnamese law notes</text>
  <text x="166" y="538" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="15">Port:</text>
  <text x="244" y="538" fill="#f1f5f9" font-family="JetBrains Mono, Consolas, monospace" font-size="15">7421</text>
  <text x="580" y="466" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="15">Token:</text>
  <rect x="650" y="444" width="176" height="34" rx="6" fill="#0b1120" stroke="#334155"/>
  <text x="674" y="466" fill="#a78bfa" font-family="JetBrains Mono, Consolas, monospace" font-size="14">ts-92ab...4f10</text>
  <rect x="844" y="444" width="74" height="34" rx="6" fill="#7c6fff"/>
  <text x="866" y="466" fill="#fff" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700">Copy</text>
  <rect x="138" y="575" width="130" height="38" rx="7" fill="#3b1f2a" stroke="#f87171"/>
  <text x="160" y="599" fill="#fca5a5" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700">Stop Sharing</text>
  <text x="303" y="599" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="14">Alice gives the token to Bob in person or through a secure channel.</text>
  <text x="80" y="708" fill="#64748b" font-family="Inter, Segoe UI, sans-serif" font-size="13">Illustrative tutorial screenshot. Actual data stays on Alice's machine.</text>
</svg>