<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Bob retrieves Vietnamese law context from Alice</title>
  <desc id="desc">Screenshot-style mock of remote LAN brain search results.</desc>
  <rect width="1200" height="760" fill="#0f172a"/>
  <rect x="44" y="36" width="1112" height="688" rx="18" fill="#111827" stroke="#334155"/>
  <text x="80" y="88" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="700">Remote Brain Search</text>
  <text x="80" y="122" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="16">Bob asks Alice's TerranSoul for legal context</text>
  <rect x="80" y="156" width="1040" height="520" rx="12" fill="#1e293b" stroke="#475569"/>
  <rect x="112" y="198" width="976" height="104" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="138" y="238" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700">Search All Connected Brains</text>
  <rect x="138" y="258" width="790" height="36" rx="7" fill="#111827" stroke="#475569"/>
  <text x="158" y="282" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="15">What should I check before signing a labor contract in Vietnam?</text>
  <rect x="946" y="258" width="94" height="36" rx="7" fill="#7c6fff"/>
  <text x="970" y="282" fill="#fff" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700">Search</text>
  <rect x="112" y="334" width="976" height="254" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="138" y="374" fill="#a78bfa" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700">Alice - Vietnamese law notes</text>
  <text x="1008" y="374" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="15">91%</text>
  <text x="138" y="408" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="17">Check the contract term, job title, workplace, salary, payment schedule, probation terms, working hours, rest days, insurance obligations, and termination conditions before signing.</text>
  <text x="138" y="440" fill="#94a3b8" font-family="JetBrains Mono, Consolas, monospace" font-size="13">tags: vietnamese-law,labor,contracts,alice-notes</text>
  <line x1="138" y1="466" x2="1060" y2="466" stroke="#334155"/>
  <text x="138" y="502" fill="#a78bfa" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700">Alice - Vietnamese law notes</text>
  <text x="1008" y="502" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="15">84%</text>
  <text x="138" y="536" fill="#f1f5f9" font-family="Inter, Segoe UI, sans-serif" font-size="17">For probation, compare the role category and agreed duration against the applicable labor-law limits, then confirm the salary during probation and the notice process after probation ends.</text>
  <text x="138" y="568" fill="#94a3b8" font-family="JetBrains Mono, Consolas, monospace" font-size="13">tags: vietnamese-law,labor,probation</text>
  <rect x="112" y="616" width="976" height="38" rx="8" fill="#172033" stroke="#334155"/>
  <text x="138" y="640" fill="#94a3b8" font-family="Inter, Segoe UI, sans-serif" font-size="14">Retrieved over MCP as ranked context snippets; Alice's full memory database stayed on Alice's desktop.</text>
  <text x="80" y="708" fill="#64748b" font-family="Inter, Segoe UI, sans-serif" font-size="13">Illustrative output. Always verify real legal questions against official sources and qualified counsel.</text>
</svg>